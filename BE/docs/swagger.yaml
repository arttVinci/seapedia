  title: SEAPEDIA API
  version: "1.0"
paths:
  /api/admin/_simulate-time:
    post:
      description: Advances system virtual time by 1 day and checks overdue SLAs for
        active orders.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_SimulateNextDayResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Simulate time +1 Day (Admin Only)
      tags:
      - Admin
  /api/admin/dashboard/stats:
    get:
      description: Get statistics for admin dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_DashboardStatsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Dashboard Stats (Admin Only)
      tags:
      - Admin
  /api/users:
    post:
      consumes:
      - application/json
      description: Create a new user account with a specific role
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.RegisterUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_RegisterUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      summary: Register a new user
      tags:
      - Users
  /api/users/_current:
    get:
      description: Ambil data user yang sedang login
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /api/users/_login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.LoginUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_LoginUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      summary: Login user
      tags:
      - Auth
  /api/users/_logout:
    post:
      description: Revoke the current JWT session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_LogoutUserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /api/users/_select-role:
    post:
      consumes:
      - application/json
      description: Switch active role and receive a new JWT
      parameters:
      - description: Role selection
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.SelectRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.WebResponse-github_com_traa_seapedia_server_internal_model_SelectRoleResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_traa_seapedia_server_internal_model.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Select Role
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
