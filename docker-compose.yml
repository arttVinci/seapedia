version: "3.8"

services:
  seapedia_be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: seapedia_be
    restart: unless-stopped
    depends_on:
      - seapedia_mysql
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=seapedia_mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    networks:
      - seapedia_network
    volumes:
      - ./BE/config.json:/app/config.json

  seapedia_mysql:
    image: mysql:8.0
    container_name: seapedia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT_EXTERNAL}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - seapedia_network

networks:
  seapedia_network:
    driver: bridge

volumes:
  mysql_data:
